<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Strata — Solana</title>
  <meta name="description" content="A living crystal visualization of the Solana blockchain. 3,248 validators, real-time block production, and Proof of History — rendered as a growing crystal formation." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="theme-color" content="#050510" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050510; }
    #app { width: 100vw; height: 100vh; }
    #app canvas { display: block; }
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #loading {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: rgba(255, 255, 255, 0.4);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      letter-spacing: 1px;
      z-index: 100;
    }
    #webgl-error {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.8;
      z-index: 100;
    }
    #webgl-error h2 {
      color: rgba(255, 255, 255, 0.8);
      font-size: 18px;
      margin-bottom: 12px;
      font-weight: 400;
    }
    @keyframes txFadeIn {
      from { opacity: 0; transform: translateX(10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    /* Mobile adjustments */
    @media (max-width: 768px) {
      .hud-text { font-size: 10px !important; }
      .hud-value { font-size: 12px !important; }
      .hud-top-left { top: 16px !important; left: 16px !important; }
      .hud-top-right { top: 16px !important; right: 16px !important; }
      .hud-bottom-center { bottom: 16px !important; }
      .tps-bar-container { width: 140px !important; }
    }
    @media (max-width: 480px) {
      .hud-top-left, .hud-top-right { font-size: 9px !important; }
      .hud-value { font-size: 11px !important; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud"></div>
  <div id="loading"></div>
  <div id="webgl-error">
    <h2>WebGL Required</h2>
    <p>This visualization requires WebGL to render.<br/>
    Please use a modern browser with hardware acceleration enabled.</p>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
